services:
  - type: web
    name: malawi-flood-ews
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python data_sync.py --models-only
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0 --server.headless true
    envVars:
      - key: GDRIVE_FOLDER
        value: /opt/render/project/data/MalawiFloodEWS
      - key: AT_API_KEY
        sync: false
      - key: AT_USERNAME
        sync: false
      - key: AT_SANDBOX
        value: "false"